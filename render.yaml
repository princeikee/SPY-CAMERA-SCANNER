services:
  - type: web
    name: spy-scanner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_PATH
        value: /var/data/spy_scanner.db
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: spy-scanner-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: spy-scanner-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: spy-scanner-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
